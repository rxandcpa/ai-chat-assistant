<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>注册 - AI 智能对话助手</title>
<link rel="stylesheet" href="css/style.css">
<style>
.auth-page { display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 20px; }
.auth-card { width: 100%; max-width: 400px; padding: 40px 32px; }
.auth-card h1 { font-size: 24px; text-align: center; margin-bottom: 4px; }
.auth-card .subtitle { text-align: center; color: var(--text-muted); font-size: 14px; margin-bottom: 32px; }
.auth-footer { text-align: center; margin-top: 20px; font-size: 14px; color: var(--text-muted); }
</style>
</head>
<body>
<div class="auth-page">
    <div class="auth-card card">
        <h1>AI 智能对话助手</h1>
        <p class="subtitle">创建你的账号</p>
        <form id="register-form">
            <div class="form-group">
                <label for="username">用户名</label>
                <input type="text" id="username" name="username" class="input" placeholder="至少 2 个字符" required minlength="2" autofocus>
                <div class="form-error"></div>
            </div>
            <div class="form-group">
                <label for="email">邮箱</label>
                <input type="email" id="email" name="email" class="input" placeholder="请输入有效邮箱" required>
                <div class="form-error"></div>
            </div>
            <div class="form-group">
                <label for="password">密码</label>
                <input type="password" id="password" name="password" class="input" placeholder="至少 6 位密码" required minlength="6">
                <div class="form-error"></div>
            </div>
            <button type="submit" class="btn btn-primary btn-block">注 册</button>
        </form>
        <p class="auth-footer">已有账号？<a href="login.html">立即登录</a></p>
    </div>
</div>
<script src="js/api.js"></script>
<script src="js/auth.js"></script>
<script>
handleForm('register-form', data => api.post('/auth/register', data), '/index.html');
</script>
</body>
</html>
